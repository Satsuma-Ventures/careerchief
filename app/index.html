<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meritous — Workspace</title>
<link rel="icon" href="../assets/careerchief-favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="../styles/app.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="./Brand.jsx"></script>
<script type="text/babel" src="./Icons.jsx"></script>
<script type="text/babel" src="./Sidebar.jsx"></script>
<script type="text/babel" src="./Conversation.jsx"></script>
<script type="text/babel" src="./BriefView.jsx"></script>
<script type="text/babel" src="./RolesView.jsx"></script>
<script type="text/babel" src="./RehearseView.jsx"></script>

<script type="text/babel">
  const { useState } = React;
  function App() {
    const [view, setView] = useState("brief");
    return (
      <div className="app-shell">
        <Sidebar view={view} setView={setView} />
        <div className="app-main">
          <main className="app-content">
            {view === "brief" && <BriefView />}
            {view === "roles" && <RolesView />}
            {view === "rehearse" && <RehearseView />}
            {view === "gaps" && <BriefView />}
            {view !== "brief" && view !== "roles" && view !== "rehearse" && view !== "gaps" && (
              <div style={{ paddingTop: 80, textAlign: "center", color: "#8AA0B4" }}>
                <div style={{ fontFamily: "'DM Serif Display', serif", letterSpacing: "-0.024em", fontSize: 22, color: "#1A2F4A", marginBottom: 8 }}>
                  Coming soon
                </div>
                <div style={{ fontSize: 13 }}>This view is part of the kit but the layout isn't built yet.</div>
              </div>
            )}
          </main>
          <aside className="app-aside">
            <Conversation />
          </aside>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
