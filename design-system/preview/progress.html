<!-- @dsCard group="Components" name="Progress" subtitle="In-progress vs complete (brass)" viewport="700x340" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<p class="card-label">Components · Progress</p>
<div class="progress" style="margin-bottom:32px">
  <div class="progress__meta"><span>Building your Career Brief</span><span><strong>60%</strong></span></div>
  <div class="progress__track"><div class="progress__bar" style="width:60%"></div></div>
</div>
<div class="progress progress--complete">
  <div class="progress__meta"><span>Career Brief</span><span><strong>Complete</strong></span></div>
  <div class="progress__track"><div class="progress__bar" style="width:100%"></div></div>
</div>
<hr class="rule">
<p class="t-caption" style="margin:0">The bar runs pine while in progress and turns brass only at 100% — the accent arrives exactly when the milestone is earned, never before.</p>
</div></body></html>
