<!-- @dsCard group="Components" name="Input" subtitle="Default, focus, filled, disabled, error, textarea" viewport="700x620" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>.grid2{gap:var(--space-5)}</style></head>
<body><div class="card">
<p class="card-label">Components · Input</p>
<div class="grid2">
  <div class="field"><label class="field__label">Current title</label><input class="input" placeholder="e.g. Staff Engineer"><span class="field__hint">Empty state shows a quiet placeholder.</span></div>
  <div class="field"><label class="field__label">Current title</label><input class="input" value="Staff Engineer" style="border-color:var(--brand);box-shadow:0 0 0 3px var(--ring)"><span class="field__hint">Focus — pine ring.</span></div>
  <div class="field"><label class="field__label">Current title</label><input class="input" value="Staff Engineer"><span class="field__hint">Filled.</span></div>
  <div class="field"><label class="field__label">Current title</label><input class="input" value="Staff Engineer" disabled><span class="field__hint">Disabled.</span></div>
</div>
<div class="field field--error" style="margin-top:24px">
  <label class="field__label">Target role <span class="req">*</span></label>
  <input class="input" aria-invalid="true" value="">
  <span class="field__error">Tell us the role you're targeting so we can aim the brief.</span>
</div>
<div class="field" style="margin-top:24px">
  <label class="field__label">In your own words, what were you actually responsible for?</label>
  <textarea class="input" placeholder="No need to polish it — write how you'd say it out loud."></textarea>
  <span class="field__hint">We work from your real history. Nothing is invented.</span>
</div>
</div></body></html>
