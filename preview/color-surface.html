<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px;">
    <div class="swatch"><div class="chip" style="background:#F6F9FB;"></div><div class="name">Off-white</div><div class="hex">#F6F9FB · page bg</div></div>
    <div class="swatch"><div class="chip" style="background:#E8EEF4;"></div><div class="name">Slate</div><div class="hex">#E8EEF4 · secondary surface</div></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF;"></div><div class="name">White</div><div class="hex">#FFFFFF · cards</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(196,150,42,0.10); border:0.5px solid rgba(196,150,42,0.25);"></div><div class="name">Gold bg</div><div class="hex">rgba(196,150,42,.10)</div></div>
  </div>
  <div style="margin-top: 12px; font-size: 11px; color: var(--color-text-muted);">Page background is always off-white — never pure white.</div>
</div></body></html>
