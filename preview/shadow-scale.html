<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 18px;">
    <div style="text-align:center;">
      <div style="background:#fff; height:64px; border-radius:12px; box-shadow: 0 1px 4px rgba(26,47,74,0.06);"></div>
      <div class="cc-mono" style="font-size:11px; margin-top:10px;">xs</div>
      <div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">step numbers</div>
    </div>
    <div style="text-align:center;">
      <div style="background:#fff; height:64px; border-radius:12px; box-shadow: 0 2px 8px rgba(26,47,74,0.08);"></div>
      <div class="cc-mono" style="font-size:11px; margin-top:10px;">sm</div>
      <div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">cards on white</div>
    </div>
    <div style="text-align:center;">
      <div style="background:#fff; height:64px; border-radius:12px; box-shadow: 0 4px 16px rgba(26,47,74,0.10);"></div>
      <div class="cc-mono" style="font-size:11px; margin-top:10px;">md</div>
      <div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">modals, dropdowns</div>
    </div>
    <div style="text-align:center;">
      <div style="background:#fff; height:64px; border-radius:12px; box-shadow: 0 8px 32px rgba(26,47,74,0.12);"></div>
      <div class="cc-mono" style="font-size:11px; margin-top:10px;">lg</div>
      <div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">popovers, panels</div>
    </div>
  </div>
  <div style="margin-top: 16px; font-size:11px; color: var(--color-text-muted);">All shadows tinted with navy — never neutral gray.</div>
</div></body></html>
