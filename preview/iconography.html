<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 14px; align-items:center;">
    <!-- Lucide-style icons, 1.5 stroke -->
    <div style="text-align:center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A2F4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      <div class="cc-mono" style="font-size: 10px; color: var(--color-text-muted); margin-top: 6px;">book</div>
    </div>
    <div style="text-align:center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A2F4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
      <div class="cc-mono" style="font-size: 10px; color: var(--color-text-muted); margin-top: 6px;">compass</div>
    </div>
    <div style="text-align:center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A2F4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <div class="cc-mono" style="font-size: 10px; color: var(--color-text-muted); margin-top: 6px;">search</div>
    </div>
    <div style="text-align:center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A2F4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"/><path d="M12 22v-6"/><path d="m4.93 4.93 4.24 4.24"/><path d="m14.83 14.83 4.24 4.24"/><circle cx="12" cy="12" r="4"/></svg>
      <div class="cc-mono" style="font-size: 10px; color: var(--color-text-muted); margin-top: 6px;">target</div>
    </div>
    <div style="text-align:center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A2F4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h6l3-9 6 18 3-9h3"/></svg>
      <div class="cc-mono" style="font-size: 10px; color: var(--color-text-muted); margin-top: 6px;">pulse</div>
    </div>
  </div>
  <div style="margin-top: 16px; padding-top: 14px; border-top: 0.5px solid var(--color-border); font-size: 12px; color: var(--color-text-secondary); line-height: 1.55;">
    <strong style="color:#1A2F4A; font-weight:600;">Lucide</strong> · 1.5px stroke · inherits text color · 16/20/24px.
    <span style="color: var(--color-text-muted);">No icon set was locked in the brief — Lucide is the working recommendation.</span>
  </div>
</div></body></html>
