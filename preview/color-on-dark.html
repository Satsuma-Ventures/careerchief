<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card" style="padding:0;">
  <div style="background:#1A2F4A; padding:24px 28px; height:100%;">
    <div class="cc-col" style="gap:12px;">
      <div style="font-family: var(--font-display); letter-spacing: -0.024em; color: rgba(255,255,255,0.95); font-size: 24px;">On-dark hierarchy.</div>
      <div style="display:flex; gap: 22px;">
        <div>
          <div style="font-size: 13px; color: rgba(255,255,255,0.95); font-weight: 500;">Primary</div>
          <div class="cc-mono" style="font-size: 10px; color: rgba(255,255,255,0.50);">white / 95%</div>
        </div>
        <div>
          <div style="font-size: 13px; color: rgba(255,255,255,0.50); font-weight: 500;">Secondary</div>
          <div class="cc-mono" style="font-size: 10px; color: rgba(255,255,255,0.50);">white / 50%</div>
        </div>
        <div>
          <div style="font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 500;">Muted</div>
          <div class="cc-mono" style="font-size: 10px; color: rgba(255,255,255,0.50);">white / 35%</div>
        </div>
        <div>
          <div style="font-size: 13px; color: #6AB0CC; font-weight: 500;">Accent</div>
          <div class="cc-mono" style="font-size: 10px; color: rgba(255,255,255,0.50);">#6AB0CC</div>
        </div>
      </div>
      <div style="display:flex; gap: 8px; margin-top: 4px;">
        <div style="background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; min-width: 90px;">
          <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 22px; color: rgba(255,255,255,0.95);">87</div>
          <div class="cc-mono" style="font-size:10px; color: rgba(255,255,255,0.50);">stat tile</div>
        </div>
        <div style="background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; min-width: 90px;">
          <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 22px; color: #C4962A;">+12</div>
          <div class="cc-mono" style="font-size:10px; color: rgba(255,255,255,0.50);">gold accent</div>
        </div>
      </div>
    </div>
  </div>
</div></body></html>
