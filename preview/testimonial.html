<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="background:#fff; border-radius:18px; padding: 22px 24px; border: 0.5px solid var(--color-border);">
    <span style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 44px; color: #E8EEF4; line-height: 0.5; display:block;">"</span>
    <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 17px; color:#1A2F4A; line-height: 1.5; font-style: italic; font-weight: 300; margin-top: 6px; margin-bottom: 18px;">I've been a hiring manager for 12 years. Meritous is the first tool that actually teaches candidates how to think about their story — not just format it.</div>
    <div style="display:flex; align-items:center; gap: 12px;">
      <div style="width:36px; height:36px; border-radius:50%; background: #E8EEF4; display:grid; place-items:center; font-size:11px; font-weight:600; color:#1A2F4A;">SR</div>
      <div>
        <div style="font-size:13px; font-weight:500; color:#1A2F4A;">Sarah R.</div>
        <div style="font-size:11px; color: var(--color-text-muted); margin-top: 1px;">VP of Talent, Series B startup</div>
      </div>
      <div style="margin-left:auto; background: rgba(196,150,42,0.10); color:#8B6B1A; font-size: 9px; font-weight:600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px;">Verified</div>
    </div>
  </div>
</div></body></html>
