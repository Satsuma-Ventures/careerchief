<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 16px; align-items:end;">
    <div style="text-align:center;"><div style="background:#1A2F4A; height:60px; border-radius:6px;"></div><div class="cc-mono" style="font-size:11px; margin-top:8px;">sm</div><div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">6px</div></div>
    <div style="text-align:center;"><div style="background:#1A2F4A; height:60px; border-radius:8px;"></div><div class="cc-mono" style="font-size:11px; margin-top:8px;">md</div><div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">8px · buttons</div></div>
    <div style="text-align:center;"><div style="background:#1A2F4A; height:60px; border-radius:12px;"></div><div class="cc-mono" style="font-size:11px; margin-top:8px;">lg</div><div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">12px</div></div>
    <div style="text-align:center;"><div style="background:#1A2F4A; height:60px; border-radius:16px;"></div><div class="cc-mono" style="font-size:11px; margin-top:8px;">xl</div><div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">16px · cards</div></div>
    <div style="text-align:center;"><div style="background:#1A2F4A; height:60px; border-radius:18px;"></div><div class="cc-mono" style="font-size:11px; margin-top:8px;">2xl</div><div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">18px · feature</div></div>
    <div style="text-align:center;"><div style="background:#1A2F4A; height:60px; border-radius:9999px;"></div><div class="cc-mono" style="font-size:11px; margin-top:8px;">full</div><div class="cc-mono" style="font-size:10px; color:var(--color-text-muted);">pills</div></div>
  </div>
</div></body></html>
