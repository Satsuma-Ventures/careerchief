<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card" style="padding: 16px 20px;">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 14px;">
    <!-- Light card -->
    <div style="background:#fff; border: 0.5px solid var(--color-border); border-radius: 16px; box-shadow: 0 2px 8px rgba(26,47,74,0.08); padding: 18px;">
      <div class="cc-kicker">Story snapshot</div>
      <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 20px; margin-top: 8px; color:#1A2F4A;">Light card.</div>
      <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 4px;">White · 0.5px border · radius-xl · shadow-sm.</div>
    </div>
    <!-- Dark card -->
    <div style="background:#1A2F4A; border-radius: 18px; padding: 18px;">
      <div style="display:inline-flex; align-items:center; gap:10px; font-size:11px; font-weight:500; letter-spacing: 0.10em; text-transform:uppercase; color: rgba(255,255,255,0.50);">
        <div style="width:22px; height:1.5px; background:#C4962A;"></div> Score
      </div>
      <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 20px; margin-top: 8px; color: rgba(255,255,255,0.95);">Dark card.</div>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <div style="background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 12px; flex:1;">
          <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 22px; color:#C4962A;">87</div>
          <div class="cc-mono" style="font-size: 10px; color: rgba(255,255,255,0.50);">overall</div>
        </div>
        <div style="background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 12px; flex:1;">
          <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 22px; color: rgba(255,255,255,0.95);">+12</div>
          <div class="cc-mono" style="font-size: 10px; color: rgba(255,255,255,0.50);">this week</div>
        </div>
      </div>
    </div>
  </div>
</div></body></html>
