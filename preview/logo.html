<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items:center;">
    <div style="background:#fff; border: 0.5px solid var(--color-border); border-radius: 12px; padding: 22px; display:flex; align-items:center; justify-content:center;">
      <img src="../assets/careerchief-lockup.svg" height="32" alt="Meritous" />
    </div>
    <div style="background:#1A2F4A; border-radius: 12px; padding: 22px; display:flex; align-items:center; justify-content:center;">
      <img src="../assets/careerchief-lockup-white.svg" height="32" alt="Meritous" />
    </div>
    <div style="background:#F6F9FB; border: 0.5px solid var(--color-border); border-radius: 12px; padding: 18px; display:flex; align-items:center; justify-content:center; gap: 14px;">
      <img src="../assets/careerchief-logomark.svg" height="44" alt="Mark" />
      <img src="../assets/careerchief-logomark.svg" height="32" alt="Mark" />
      <img src="../assets/careerchief-logomark.svg" height="22" alt="Mark" />
    </div>
    <div style="background:#1A2F4A; border-radius: 12px; padding: 18px; display:flex; align-items:center; justify-content:center; gap: 14px;">
      <img src="../assets/careerchief-logomark-white.svg" height="44" alt="Mark" />
      <img src="../assets/careerchief-logomark-white.svg" height="32" alt="Mark" />
      <img src="../assets/careerchief-logomark-white.svg" height="22" alt="Mark" />
    </div>
  </div>
</div></body></html>
