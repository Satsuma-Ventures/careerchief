<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="background:#1A2F4A; border-radius: 18px; padding: 22px;">
    <div style="font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px;">Your career brief</div>
    <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 18px; color:#fff; line-height: 1.3; font-style: italic; font-weight: 400; margin-bottom: 18px; max-width: 320px;">"Here's what you've built — and here's how to say it."</div>
    <div style="display:flex; gap:8px; margin-bottom: 16px;">
      <div style="flex:1; background: rgba(255,255,255,0.07); border:0.5px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px 10px;">
        <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 26px; color:#C4962A; font-weight: 300; line-height: 1;">87</div>
        <div style="font-size:10px; color: rgba(255,255,255,0.40); margin-top: 4px; letter-spacing: 0.04em;">Story score</div>
      </div>
      <div style="flex:1; background: rgba(255,255,255,0.07); border:0.5px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px 10px;">
        <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 26px; color:#fff; font-weight: 300; line-height: 1;">3</div>
        <div style="font-size:10px; color: rgba(255,255,255,0.40); margin-top: 4px; letter-spacing: 0.04em;">Gaps to close</div>
      </div>
      <div style="flex:1; background: rgba(255,255,255,0.07); border:0.5px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px 10px;">
        <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 26px; color:#fff; font-weight: 300; line-height: 1;">Top 12%</div>
        <div style="font-size:10px; color: rgba(255,255,255,0.40); margin-top: 4px; letter-spacing: 0.04em;">In your field</div>
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px;"><span>Narrative clarity</span><span>91%</span></div>
      <div style="height:3px; background: rgba(255,255,255,0.08); border-radius:2px;"><div style="height:100%; width:91%; background:#6AB0CC; border-radius:2px;"></div></div>
    </div>
    <div>
      <div style="display:flex; justify-content:space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px;"><span>Impact quantification</span><span>62%</span></div>
      <div style="height:3px; background: rgba(255,255,255,0.08); border-radius:2px;"><div style="height:100%; width:62%; background:#C4962A; border-radius:2px;"></div></div>
    </div>
  </div>
</div></body></html>
