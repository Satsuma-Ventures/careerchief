<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
    <div class="swatch"><div class="chip" style="background:#1A2F4A;"></div><div class="name">Navy</div><div class="hex">#1A2F4A</div></div>
    <div class="swatch"><div class="chip" style="background:#0F1E30;"></div><div class="name">Navy dark</div><div class="hex">#0F1E30</div></div>
    <div class="swatch"><div class="chip" style="background:#2A6C8E;"></div><div class="name">Steel</div><div class="hex">#2A6C8E</div></div>
    <div class="swatch"><div class="chip" style="background:#6AB0CC;"></div><div class="name">Steel light</div><div class="hex">#6AB0CC</div></div>
    <div class="swatch"><div class="chip" style="background:#C4962A;"></div><div class="name">Gold</div><div class="hex">#C4962A</div></div>
  </div>
  <div style="margin-top: 12px; font-size: 11px; color: var(--color-text-muted);">Gold appears only for achievement moments — scores, milestones, the kicker rule.</div>
</div></body></html>
