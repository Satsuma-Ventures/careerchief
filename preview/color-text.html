<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div class="cc-col" style="gap: 14px;">
    <div style="display:flex; align-items:center; gap:18px;">
      <div style="width:24px; height:24px; border-radius:6px; background:#1A2F4A;"></div>
      <div style="font-size:15px; color:#1A2F4A; font-weight:500;">Primary — body, headings</div>
      <div class="cc-mono" style="font-size:11px; color:var(--color-text-muted); margin-left:auto;">#1A2F4A</div>
    </div>
    <div style="height:1px; background:var(--color-border);"></div>
    <div style="display:flex; align-items:center; gap:18px;">
      <div style="width:24px; height:24px; border-radius:6px; background:#4A6480;"></div>
      <div style="font-size:15px; color:#4A6480;">Secondary — supporting copy</div>
      <div class="cc-mono" style="font-size:11px; color:var(--color-text-muted); margin-left:auto;">#4A6480</div>
    </div>
    <div style="height:1px; background:var(--color-border);"></div>
    <div style="display:flex; align-items:center; gap:18px;">
      <div style="width:24px; height:24px; border-radius:6px; background:#8AA0B4;"></div>
      <div style="font-size:15px; color:#8AA0B4;">Muted — captions, placeholders</div>
      <div class="cc-mono" style="font-size:11px; color:var(--color-text-muted); margin-left:auto;">#8AA0B4</div>
    </div>
    <div style="height:1px; background:var(--color-border);"></div>
    <div style="display:flex; align-items:center; gap:18px;">
      <div style="width:24px; height:24px; border-radius:6px; background:#2A6C8E;"></div>
      <div style="font-size:15px; color:#2A6C8E;">Link — accent, anchors</div>
      <div class="cc-mono" style="font-size:11px; color:var(--color-text-muted); margin-left:auto;">#2A6C8E</div>
    </div>
  </div>
</div></body></html>
