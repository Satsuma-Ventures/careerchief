<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div class="cc-col" style="gap: 16px;">
    <div>
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 6px;">
        <div style="font-size: 13px; font-weight: 500; color: #1A2F4A;">Story completeness</div>
        <div class="cc-mono" style="font-size: 11px; color: var(--color-text-muted);">68%</div>
      </div>
      <div style="height: 3px; background: #E8EEF4; border-radius: 9999px; overflow: hidden;">
        <div style="height: 100%; width: 68%; background: #6AB0CC; border-radius: 9999px;"></div>
      </div>
    </div>
    <div>
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 6px;">
        <div style="font-size: 13px; font-weight: 500; color: #1A2F4A;">Open threads</div>
        <div class="cc-mono" style="font-size: 11px; color: #8B6B1A;">3 flagged</div>
      </div>
      <div style="height: 3px; background: #E8EEF4; border-radius: 9999px; overflow: hidden;">
        <div style="height: 100%; width: 32%; background: #C4962A; border-radius: 9999px;"></div>
      </div>
    </div>
    <!-- On dark -->
    <div style="background:#1A2F4A; padding: 14px 16px; border-radius: 12px; margin-top: 4px;">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 6px;">
        <div style="font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.95);">Interview prep</div>
        <div class="cc-mono" style="font-size: 10px; color: rgba(255,255,255,0.50);">on dark · 3px height</div>
      </div>
      <div style="height: 3px; background: rgba(255,255,255,0.08); border-radius: 9999px; overflow: hidden;">
        <div style="height: 100%; width: 82%; background: #6AB0CC; border-radius: 9999px;"></div>
      </div>
    </div>
  </div>
</div></body></html>
