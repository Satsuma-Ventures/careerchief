<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .tag { display: inline-block; font-family: var(--font-sans); font-size: 10px; font-weight: 600; padding: 5px 11px; border-radius: 9999px; letter-spacing: 0.08em; text-transform: uppercase; }
  .tag-navy { background: rgba(26,47,74,0.10); color: #1A2F4A; }
  .tag-steel { background: rgba(42,108,142,0.12); color: #2A6C8E; }
  .tag-gold { background: rgba(196,150,42,0.10); color: #8B6B1A; }
</style>
</head><body><div class="cc-card">
  <div style="display:flex; gap: 8px; flex-wrap: wrap; align-items:center;">
    <span class="tag tag-navy">In review</span>
    <span class="tag tag-steel">Strategy</span>
    <span class="tag tag-steel">Product</span>
    <span class="tag tag-gold">Milestone</span>
    <span class="tag tag-navy">Draft</span>
    <span class="tag tag-gold">★ 87</span>
  </div>
  <div class="cc-mono" style="font-size:11px; color: var(--color-text-muted); margin-top: 18px;">4–5px vertical · 10–12px horizontal · UPPERCASE · 0.08em tracking</div>
</div></body></html>
