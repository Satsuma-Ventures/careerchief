<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="cc-card">
  <div class="cc-col" style="gap: 18px;">
    <div>
      <div class="cc-kicker">Story snapshot</div>
      <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 28px; margin-top: 8px;">Where you've been making impact.</div>
    </div>
    <div style="height: 1px; background: var(--color-border);"></div>
    <div style="display:flex; gap: 22px; align-items:flex-start;">
      <div>
        <div class="cc-kicker">Achievement</div>
        <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 22px; margin-top: 6px;">Senior PM, 2023.</div>
      </div>
      <div>
        <div class="cc-kicker">Open thread</div>
        <div style="font-family: var(--font-display); letter-spacing: -0.024em; font-size: 22px; margin-top: 6px;">Strategy work, 2021.</div>
      </div>
    </div>
    <div style="font-size: 12px; color: var(--color-text-muted); font-family: var(--font-mono);">22 × 1.5px gold rule · uppercase Jakarta 500 · 0.10em tracking</div>
  </div>
