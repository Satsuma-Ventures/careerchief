<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family: var(--font-sans); font-size: 14px; font-weight: 500; padding: 12px 24px; border-radius: 8px; border: 0; cursor: pointer; letter-spacing: 0; transition: all 0.15s ease; }
  .btn-primary { background:#1A2F4A; color:#fff; }
  .btn-primary:hover { background:#0F1E30; }
  .btn-secondary { background: transparent; color:#1A2F4A; border:1px solid #1A2F4A; }
  .btn-secondary:hover { background:#E8EEF4; }
  .btn-accent { background:#2A6C8E; color:#fff; }
  .btn-ghost { background: transparent; color: rgba(26,47,74,0.70); }
  .btn-ghost:hover { color:#1A2F4A; }
  .btn-inverse { background:#fff; color:#1A2F4A; border: 0.5px solid var(--color-border); }
</style>
</head><body><div class="cc-card">
  <div style="display:flex; gap: 10px; flex-wrap: wrap; align-items:center;">
    <button class="btn btn-primary">Review my story</button>
    <button class="btn btn-secondary">Skip for now</button>
    <button class="btn btn-accent">Continue</button>
    <button class="btn btn-ghost">Cancel</button>
    <div style="background:#1A2F4A; padding: 8px 10px; border-radius: 10px;">
      <button class="btn btn-inverse">On dark</button>
    </div>
  </div>
  <div class="cc-mono" style="font-size:11px; color: var(--color-text-muted); margin-top: 16px;">12–13px vertical · 24–26px horizontal · Plus Jakarta 500 · 14px · 8px radius</div>
</div></body></html>
